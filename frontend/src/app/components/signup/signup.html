<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title text-center">Signup</h3>
          <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" formControlName="username" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" formControlName="email" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" formControlName="password" class="form-control">
            </div>
            <button type="submit" [disabled]="!signupForm.valid" class="btn btn-success w-100">Create Account</button>
            <p class="mt-3 text-center">Already have an account? <a routerLink="/login">Login</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
