<div class="container mt-3 mt-md-4 mb-4">
  <div class="card shadow border-0 mx-auto" style="max-width: 800px;">
    
    <div class="card-header bg-warning text-dark py-3">
      <h3 class="mb-1 fs-4 fw-bold text-center text-md-start">Update Employee: {{ employeeName }}</h3>
    </div>
    
    <div class="card-body p-4">
      <form [formGroup]="updateForm" (ngSubmit)="onSubmit()">
        
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-bold small text-uppercase text-muted">First Name</label>
            <input type="text" formControlName="first_name" class="form-control"
              [class.is-invalid]="getErrorMessage('first_name')">
            <div class="invalid-feedback">{{ getErrorMessage('first_name') }}</div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold small text-uppercase text-muted">Last Name</label>
            <input type="text" formControlName="last_name" class="form-control"
              [class.is-invalid]="getErrorMessage('last_name')">
            <div class="invalid-feedback">{{ getErrorMessage('last_name') }}</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold small text-uppercase text-muted">Email Address</label>
          <input type="email" formControlName="email" class="form-control"
            [class.is-invalid]="getErrorMessage('email')">
          <div class="invalid-feedback">{{ getErrorMessage('email') }}</div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-bold small text-uppercase text-muted">Designation</label>
            <input type="text" formControlName="designation" class="form-control"
              [class.is-invalid]="getErrorMessage('designation')">
            <div class="invalid-feedback">{{ getErrorMessage('designation') }}</div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold small text-uppercase text-muted">Department</label>
            <input type="text" formControlName="department" class="form-control"
              [class.is-invalid]="getErrorMessage('department')">
            <div class="invalid-feedback">{{ getErrorMessage('department') }}</div>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-4">
            <label class="form-label fw-bold small text-uppercase text-muted">Salary</label>
            <input type="number" formControlName="salary" class="form-control"
              [class.is-invalid]="getErrorMessage('salary')">
            <div class="invalid-feedback">{{ getErrorMessage('salary') }}</div>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold small text-uppercase text-muted">Gender</label>
            <select formControlName="gender" class="form-select">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold small text-uppercase text-muted">Date of Joining</label>
            <input type="date" formControlName="date_of_joining" class="form-control"
              [class.is-invalid]="getErrorMessage('date_of_joining')">
            <div class="invalid-feedback">{{ getErrorMessage('date_of_joining') }}</div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold small text-uppercase text-muted">Photo URL</label>
          <div class="d-flex align-items-center gap-3 p-3 bg-light rounded border">
             <img [src]="updateForm.get('employee_photo')?.value || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'" 
                  class="rounded shadow-sm border" style="width: 50px; height: 50px; object-fit: cover;"
                  onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
             <input type="text" formControlName="employee_photo" class="form-control bg-white">
          </div>
        </div>

        <div class="d-flex justify-content-between pt-3 border-top">
          <button type="button" class="btn btn-outline-secondary px-4" routerLink="/employees">Cancel</button>
          <button type="submit" class="btn btn-warning px-5 fw-bold">Update Employee</button>
        </div>
      </form>
    </div>
  </div>
</div>
