<div class="container mt-4">
  <div class="card shadow border-primary">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h3 class="mb-0">Update Employee Details</h3>
      <span class="badge bg-light text-primary">ID: {{eid}}</span>
    </div>
    
    <div class="card-body">
      <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
        
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">First Name</label>
            <input type="text" formControlName="first_name" class="form-control border-primary" placeholder="Enter first name">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Last Name</label>
            <input type="text" formControlName="last_name" class="form-control border-primary" placeholder="Enter last name">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Email Address</label>
          <input type="email" formControlName="email" class="form-control border-primary" placeholder="Enter email address">
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Designation</label>
            <input type="text" formControlName="designation" class="form-control border-primary" placeholder="e.g. Senior Developer">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Salary ($)</label>
            <input type="number" formControlName="salary" class="form-control border-primary">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Gender</label>
            <select formControlName="gender" class="form-select border-primary">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Date of Joining</label>
            <input type="date" formControlName="date_of_joining" class="form-control border-primary">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Department</label>
            <input type="text" formControlName="department" class="form-control border-primary" placeholder="Enter department">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Employee Photo URL (Optional)</label>
            <input type="text" formControlName="employee_photo" class="form-control border-primary" placeholder="Paste image URL or base64 string">
          </div>
        </div>

        <div class="alert alert-secondary py-2 mt-2">
          <small><i class="bi bi-info-circle-fill"></i> All employee details can be updated.</small>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4 border-top pt-3">
          <button type="button" class="btn btn-outline-secondary px-4" routerLink="/employees">
            Cancel
          </button>
          <button type="submit" [disabled]="!employeeForm.valid" class="btn btn-primary px-5 fw-bold shadow-sm">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
