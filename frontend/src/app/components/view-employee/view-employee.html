<div class="container mt-3 mt-md-4 mb-4">
  <div class="card shadow border-0 mx-auto" style="max-width: 700px;">
    
    <div class="card-header bg-dark text-white text-center py-4">
      <div class="mb-3 position-relative">
        <img 
          [src]="employee?.employee_photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'" 
          class="rounded-circle img-thumbnail shadow" 
          style="width: 160px; height: 160px; object-fit: cover; border: 4px solid #fff;"
          onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"
        >
      </div>
      <h2 class="mb-1">{{ employee?.first_name }} {{ employee?.last_name }}</h2>
      <span class="badge bg-info text-dark px-3 py-2 fs-6">{{ employee?.designation }}</span>
    </div>

    <div class="card-body p-4">
      <div class="row g-4">
        
        <div class="col-md-6">
          <label class="text-muted small fw-bold text-uppercase">Email Address</label>
          <p class="fs-5">{{ employee?.email }}</p>
        </div>

        <div class="col-md-6">
          <label class="text-muted small fw-bold text-uppercase">Gender</label>
          <p class="fs-5">{{ employee?.gender }}</p>
        </div>

        <div class="col-md-6">
          <label class="text-muted small fw-bold text-uppercase">Department</label>
          <p class="fs-5">{{ employee?.department }}</p>
        </div>

        <div class="col-md-6">
          <label class="text-muted small fw-bold text-uppercase">Date of Joining</label>
          <p class="fs-5">{{ employee?.date_of_joining }}</p>
        </div>

        <div class="col-md-6">
          <label class="text-muted small fw-bold text-uppercase">Salary</label>
          <p class="fs-5 text-success fw-bold">${{ employee?.salary | number }}</p>
        </div>

        <div class="col-md-6">
          <label class="text-muted small fw-bold text-uppercase">Employee ID</label>
          <p class="text-muted small">{{ employee?.id }}</p>
        </div>

      </div>
    </div>

    <div class="card-footer bg-light p-3 d-flex justify-content-between">
      <button class="btn btn-secondary px-4" routerLink="/employees">
        <i class="bi bi-arrow-left"></i> Back
      </button>
      <button class="btn btn-warning px-4" [routerLink]="['/update-employee', employee?.id]">
        <i class="bi bi-pencil-square"></i> Update Profile
      </button>
    </div>
  </div>
</div>
