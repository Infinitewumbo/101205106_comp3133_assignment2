<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>Add New Employee</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">First Name</label>
            <input type="text" formControlName="first_name" class="form-control">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" formControlName="last_name" class="form-control">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" formControlName="email" class="form-control">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Salary</label>
            <input type="number" formControlName="salary" class="form-control">
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Department</label>
            <input type="text" formControlName="department" class="form-control">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Designation</label>
            <input type="text" formControlName="designation" class="form-control">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Date of Joining</label>
            <input type="date" formControlName="date_of_joining" class="form-control">
          </div>
        </div>

          <div class="mb-3">
          <label class="form-label fw-bold">Employee Photo URL</label>
          <input 
            type="text" 
            formControlName="employee_photo" 
            class="form-control" 
            placeholder="https://example.com/photo.jpg"
          >
          <div class="form-text text-muted">
            Paste an image link from the web to display a profile picture.
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">
          <button type="button" class="btn btn-secondary" routerLink="/employees">Cancel</button>
          <button type="submit" [disabled]="!employeeForm.valid" class="btn btn-success">Save Employee</button>
        </div>
      </form>
    </div>
  </div>
</div>
