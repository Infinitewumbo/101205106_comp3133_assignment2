<section class="auth-shell">
  <div class="card auth-card border-0">
    <div class="card-body p-4 p-md-5">
      <h2 class="auth-title mb-1">Create Account</h2>
      <p class="auth-subtitle">Set up your access to the employee management portal.</p>

      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" formControlName="username" class="form-control form-control-lg" placeholder="Choose a username">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" formControlName="email" class="form-control form-control-lg" placeholder="name@company.com">
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" formControlName="password" class="form-control form-control-lg" placeholder="At least 6 characters">
        </div>

        <button type="submit" [disabled]="!signupForm.valid" class="btn btn-success w-100 py-2">Create Account</button>
        <p class="mt-3 mb-0 text-center text-muted">Already have an account? <a routerLink="/login" class="fw-semibold text-decoration-none">Login</a></p>
      </form>
    </div>
  </div>
</section>
