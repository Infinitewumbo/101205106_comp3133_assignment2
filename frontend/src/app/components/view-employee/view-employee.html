<div class="container mt-5">
  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status"></div>
    <p>Loading employee data...</p>
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
    <button class="btn btn-link" (click)="goBack()">Go Back</button>
  </div>

  <div *ngIf="!loading && employee" class="card shadow-lg border-0">
    <div class="card-header bg-dark text-white p-4">
      <h2 class="mb-0">{{ employee.first_name }} {{ employee.last_name }}</h2>
      <p class="mb-0 opacity-75">{{ employee.designation }}</p>
    </div>
    <div class="card-body p-4">
      <div class="row">
        <div class="col-md-6 mb-4">
          <label class="text-muted small text-uppercase fw-bold">Email</label>
          <p class="fs-5">{{ employee.email }}</p>
        </div>
        <div class="col-md-6 mb-4">
          <label class="text-muted small text-uppercase fw-bold">Department</label>
          <p class="fs-5">{{ employee.department }}</p>
        </div>
        <div class="col-md-6 mb-4">
          <label class="text-muted small text-uppercase fw-bold">Salary</label>
          <p class="fs-5 text-success">${{ employee.salary | number }}</p>
        </div>
        <div class="col-md-6 mb-4">
          <label class="text-muted small text-uppercase fw-bold">Date of Joining</label>
          <p class="fs-5">{{ employee.date_of_joining }}</p>
        </div>
      </div>
    </div>
    <div class="card-footer bg-light p-3 d-flex justify-content-between">
      <button class="btn btn-secondary px-4" (click)="goBack()">
        <i class="bi bi-arrow-left"></i> Back to List
      </button>
      <a class="btn btn-warning px-4" [routerLink]="['/update-employee', eid]">
        Edit Details
      </a>
    </div>
  </div>
</div>
